# netlify.toml — NeuralDock AI Studio deployment config

[build]
  publish = "."        # deploy from repo root (index.html is at root)

# Serve index.html for all routes (SPA fallback)
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# Cache JS modules aggressively (they're versioned by filename)
[[headers]]
  for = "/js/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache CSS
[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Never cache HTML (always fetch fresh so deploys take effect immediately)
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
